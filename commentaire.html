<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Merci pour votre retour | Distritec</title>
  <style>
    :root {
      --brand-primary: #BB2A0A;
      --brand-secondary: #9D9B8D;
      --brand-bg: #f6f3ef;
      --card-bg: #ffffff;
      --text-main: #1f1f1c;
      --text-soft: #5f5d57;
      --border: #e7e2d9;
      --success-bg: #f7ebe7;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #faf8f5 0%, var(--brand-bg) 100%);
      padding: 40px 16px;
      color: var(--text-main);
    }

    .wrap {
      max-width: 560px;
      margin: 0 auto;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 32px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
    }

    .brand-row img {
      width: 54px;
      height: auto;
      display: block;
      flex-shrink: 0;
    }

    .brand-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .brand-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-main);
    }

    .brand-sub {
      font-size: 12px;
      color: var(--text-soft);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    h1 {
      margin: 0 0 10px 0;
      font-size: 28px;
      line-height: 1.2;
      color: var(--text-main);
    }

    .intro {
      margin: 0 0 12px 0;
      color: var(--text-soft);
      font-size: 15px;
      line-height: 1.65;
    }

    .badge {
      display: inline-block;
      margin-top: 8px;
      padding: 7px 14px;
      border-radius: 999px;
      background: var(--success-bg);
      color: var(--brand-primary);
      font-weight: 700;
      font-size: 14px;
    }

    .section-label {
      margin-top: 26px;
      margin-bottom: 10px;
      font-size: 12px;
      font-weight: 700;
      color: var(--brand-secondary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    textarea {
      width: 100%;
      min-height: 130px;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 14px;
      line-height: 1.6;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      background: #fcfbf9;
      color: var(--text-main);
    }

    textarea:focus {
      border-color: var(--brand-primary);
      box-shadow: 0 0 0 3px rgba(187, 42, 10, 0.10);
    }

    textarea::placeholder {
      color: #9a978f;
    }

    button {
      width: 100%;
      margin-top: 16px;
      padding: 15px 18px;
      border: none;
      border-radius: 14px;
      background: var(--brand-primary);
      color: white;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.08s ease, opacity 0.2s ease;
    }

    button:hover {
      opacity: 0.95;
    }

    button:active {
      transform: scale(0.995);
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .ok, .err {
      display: none;
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
    }

    .ok {
      background: #f7ebe7;
      color: var(--brand-primary);
    }

    .err {
      background: #fff1ef;
      color: #b42318;
    }

    .footer-note {
      margin-top: 18px;
      font-size: 12px;
      color: #908d86;
      line-height: 1.5;
    }

    @media (max-width: 640px) {
      .card {
        padding: 24px 20px;
      }

      h1 {
        font-size: 24px;
      }

      .brand-row img {
        width: 46px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="brand-row">
        <img
          src="https://www.dgroupe.fr/wp-content/uploads/2025/11/683614629ea4783e47c646ca_D-Groupe-logo-p-500.png"
          alt="Logo Distritec"
        />
        <div class="brand-text">
          <div class="brand-name">Distritec</div>
          <div class="brand-sub">Solutions supply chain</div>
        </div>
      </div>

      <h1>Merci pour votre note</h1>
      <p class="intro" id="message">
        Merci pour votre retour.
      </p>
      <div class="badge" id="noteBadge">Note reçue</div>

      <div class="section-label">Un commentaire complémentaire ?</div>
      <textarea
        id="commentaire"
        placeholder="Dites-nous en quelques mots comment s'est passée votre prestation..."
      ></textarea>

      <button id="sendBtn" onclick="envoyer()">Envoyer mon commentaire</button>

      <div class="ok" id="ok">Merci, votre commentaire a bien été transmis.</div>
      <div class="err" id="err">Une erreur est survenue. Merci de réessayer.</div>

      <div class="footer-note">
        Votre retour aide Distritec à améliorer en continu la qualité de ses prestations.
      </div>
    </div>
  </div>

  <script>
    const WEBHOOK_URL = 'https://n8n.srv958954.hstgr.cloud/webhook/a3f09222-6d0f-4668-92e6-7fa0ec62bfff';

    const p = new URLSearchParams(window.location.search);
    const call_id = p.get('call_id') || '';
    const note = p.get('note') || '';
    const name = p.get('name') || '';

    const message = document.getElementById('message');
    const noteBadge = document.getElementById('noteBadge');

    message.textContent = `Merci${name ? ' ' + name : ''} pour votre note.`;
    noteBadge.textContent = note ? `${note}/5` : 'Note reçue';

    async function envoyer() {
      const btn = document.getElementById('sendBtn');
      const ok = document.getElementById('ok');
      const err = document.getElementById('err');
      const commentaire = document.getElementById('commentaire').value.trim();

      ok.style.display = 'none';
      err.style.display = 'none';

      btn.disabled = true;
      btn.textContent = 'Envoi en cours...';

      try {
        const res = await fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            call_id,
            note,
            commentaire,
            date: new Date().toISOString()
          })
        });

        if (!res.ok) {
          throw new Error('Erreur webhook');
        }

        ok.style.display = 'block';
        btn.textContent = 'Commentaire envoyé';
      } catch (e) {
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Envoyer mon commentaire';
      }
    }
  </script>
</body>
</html>
