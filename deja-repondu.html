<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Réponse déjà enregistrée | Distritec</title>
  <style>
    :root {
      --brand-primary: #BB2A0A;
      --brand-secondary: #9D9B8D;
      --brand-bg: #f6f3ef;
      --card-bg: #ffffff;
      --text-main: #1f1f1c;
      --text-soft: #5f5d57;
      --border: #e7e2d9;
      --info-bg: #f8f6f2;
      --info-border: #e4ddd2;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #faf8f5 0%, var(--brand-bg) 100%);
      padding: 40px 16px;
      color: var(--text-main);
    }

    .wrap {
      max-width: 560px;
      margin: 0 auto;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 32px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
      text-align: center;
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 28px;
    }

    .brand-row img {
      width: 54px;
      height: auto;
      display: block;
      flex-shrink: 0;
    }

    .brand-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
      text-align: left;
    }

    .brand-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-main);
    }

    .brand-sub {
      font-size: 12px;
      color: var(--text-soft);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .icon-box {
      width: 78px;
      height: 78px;
      margin: 10px auto 20px;
      border-radius: 50%;
      background: var(--info-bg);
      border: 1px solid var(--info-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      color: var(--brand-primary);
    }

    h1 {
      margin: 0 0 12px 0;
      font-size: 28px;
      line-height: 1.2;
      color: var(--text-main);
    }

    p {
      margin: 0;
      font-size: 15px;
      line-height: 1.7;
      color: var(--text-soft);
    }

    .footer-note {
      margin-top: 24px;
      font-size: 12px;
      color: #908d86;
      line-height: 1.5;
    }

    @media (max-width: 640px) {
      .card {
        padding: 24px 20px;
      }

      h1 {
        font-size: 24px;
      }

      .brand-row img {
        width: 46px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="brand-row">
        <img
          src="https://www.dgroupe.fr/wp-content/uploads/2025/11/683614629ea4783e47c646ca_D-Groupe-logo-p-500.png"
          alt="Logo Distritec"
        />
        <div class="brand-text">
          <div class="brand-name">Distritec</div>
          <div class="brand-sub">Solutions Supply Chain</div>
        </div>
      </div>

      <div class="icon-box">✓</div>

      <h1>Réponse déjà enregistrée</h1>
      <p>
        Vous avez déjà répondu à cette enquête.<br>
        Merci pour votre compréhension.<br><br>
        Vous pouvez fermer cette fenêtre.
      </p>

      <div class="footer-note">
        Distritec vous remercie pour votre confiance.
      </div>
    </div>
  </div>
</body>
</html>
